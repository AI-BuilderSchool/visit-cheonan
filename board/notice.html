<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공지사항 — Visit Local</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23000000'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='26' font-weight='700' font-family='Arial, sans-serif' fill='%23FFFFFF'%3EVL%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#FAF6EC; --bg-alt:#F1E9D8; --surface:#FFFFFF;
    --ink:#26221B; --ink-soft:#635C4C; --ink-faint:#8D8570;
    --indigo:#1D2B4A; --indigo-soft:#3D4C74;
    --gold:#B8862E; --gold-soft:#D9AC5C;
    --brick:#9C4C36; --sage:#576848;
    --line:rgba(38,34,27,0.14);
    --shadow:0 20px 50px -28px rgba(38,34,27,0.35);
    --font-display:"Noto Serif KR","Nanum Myeongjo","Batang",serif;
    --font-body:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--font-body); line-height:1.6}
  a{color:inherit; text-decoration:none}
  button{font:inherit; cursor:pointer}
  h1,h2{font-family:var(--font-display); font-weight:600; margin:0}

  .wrap{max-width:820px; margin:0 auto; padding:0 20px 80px}

  .board-head{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    max-width:820px; margin:0 auto; padding:20px; border-bottom:1px solid var(--line);
  }
  .brand{font-family:var(--font-display); font-weight:700; font-size:1.1rem; letter-spacing:.02em}
  @media (max-width:480px){ .board-head{padding:14px 16px} }

  .board-intro{padding:40px 0 24px; text-align:center}
  .eyebrow{font-size:.72rem; font-weight:700; letter-spacing:.14em; color:var(--gold)}
  .board-intro h1{font-size:clamp(1.5rem,4vw,2rem); margin-top:8px}
  .board-intro p{color:var(--ink-soft); font-size:.92rem; margin-top:10px}

  .notice-list{display:flex; flex-direction:column; gap:10px}
  .notice-item{background:var(--surface); border-radius:14px; box-shadow:var(--shadow); overflow:hidden}
  .notice-row{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:16px 20px; width:100%; background:none; border:none; text-align:left; color:inherit;
  }
  .notice-row .n-title{font-size:.94rem; font-weight:700}
  .notice-row .n-date{font-size:.78rem; color:var(--ink-faint); flex:none}
  .notice-row .n-chev{margin-left:10px; flex:none; transition:transform .2s ease; color:var(--ink-faint)}
  .notice-item.open .n-chev{transform:rotate(180deg)}
  .notice-body{max-height:0; overflow:hidden; transition:max-height .25s ease}
  .notice-item.open .notice-body{max-height:600px}
  .notice-body-inner{padding:0 20px 20px; font-size:.88rem; color:var(--ink-soft); white-space:pre-wrap; border-top:1px solid var(--line); padding-top:14px; margin:0 20px}
  .empty{text-align:center; color:var(--ink-faint); font-size:.88rem; padding:40px 0}
</style>
</head>
<body>

<div class="board-head">
  <a class="brand" href="../index.html">VISIT-LOCAL</a>
</div>

<div class="wrap">
  <div class="board-intro">
    <span class="eyebrow">COMMUNITY</span>
    <h1>공지사항</h1>
    <p>내 지역 방문 전 꼭 확인해야 할 소식을 안내해드려요.</p>
  </div>

  <div class="notice-list" id="noticeList"><p class="empty">공지사항을 불러오는 중입니다...</p></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var SUPABASE_URL = 'https://fwxucmkwhxakkhpjzvyu.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_1xz6RFenbcEYarVGWOBsAw_0JsXq_xz';
  var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var noticeList = document.getElementById('noticeList');

  function escapeHtml(str){
    var div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function loadNotices(){
    supabaseClient.from('notices')
      .select('id, title, content, author_name, created_at')
      .order('created_at', { ascending: false })
      .then(function(res){
        if (res.error){
          noticeList.innerHTML = '<p class="empty">공지사항을 불러오지 못했습니다: ' + escapeHtml(res.error.message) + '</p>';
          return;
        }
        var rows = res.data || [];
        if (!rows.length){
          noticeList.innerHTML = '<p class="empty">등록된 공지사항이 없습니다.</p>';
          return;
        }
        noticeList.innerHTML = rows.map(function(n){
          var created = n.created_at ? new Date(n.created_at).toLocaleDateString('ko-KR') : '';
          return '<article class="notice-item" data-id="' + n.id + '">' +
            '<button type="button" class="notice-row">' +
              '<span class="n-title">' + escapeHtml(n.title) + '</span>' +
              '<span class="n-date">' + escapeHtml(created) + '</span>' +
              '<svg class="n-chev" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
            '</button>' +
            '<div class="notice-body"><p class="notice-body-inner">' + escapeHtml(n.content) + '</p></div>' +
            '</article>';
        }).join('');

        noticeList.querySelectorAll('.notice-row').forEach(function(row){
          row.addEventListener('click', function(){
            row.closest('.notice-item').classList.toggle('open');
          });
        });
      });
  }

  loadNotices();
})();
</script>
</body>
</html>
